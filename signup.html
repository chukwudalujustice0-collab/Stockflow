<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StockFlow | Sign Up</title>
  <link rel="manifest" href="./manifest.json?v=30" />
  <meta name="theme-color" content="#0b5ed7" />
  <link rel="stylesheet" href="./css/style.css?v=30" />
</head>
<body class="auth-body">
  <div class="auth-container">
    <div class="brand-box">
      <h1>StockFlow</h1>
      <p>Smart Business OS by Ceetify</p>
    </div>

    <div class="card">
      <h3>Create Account</h3>
      <p class="small-text">Start your business system with one account.</p>

      <form id="signupForm">
        <div class="form-group">
          <label for="fullName">Full Name</label>
          <input
            type="text"
            id="fullName"
            placeholder="Enter your full name"
            required
          />
        </div>

        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input
            type="tel"
            id="phone"
            placeholder="Enter your phone number"
            required
          />
        </div>

        <div class="form-group">
          <label for="signupEmail">Email Address</label>
          <input
            type="email"
            id="signupEmail"
            placeholder="Enter your email"
            required
            autocomplete="email"
          />
        </div>

        <div class="form-group">
          <label for="signupPassword">Password</label>
          <div class="password-row">
            <input
              type="password"
              id="signupPassword"
              placeholder="Create password"
              required
              autocomplete="new-password"
            />
            <button
              type="button"
              id="toggleSignupPasswordBtn"
              class="btn-outline inline-btn"
            >
              Show
            </button>
          </div>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <div class="password-row">
            <input
              type="password"
              id="confirmPassword"
              placeholder="Confirm password"
              required
              autocomplete="new-password"
            />
            <button
              type="button"
              id="toggleConfirmPasswordBtn"
              class="btn-outline inline-btn"
            >
              Show
            </button>
          </div>
        </div>

        <button type="submit" class="btn-primary full-btn">
          Create Account
        </button>
      </form>

      <p id="signupMessage" class="message"></p>

      <div class="auth-footer-links">
        <p><a href="./login.html">Already have an account? Login</a></p>
        <p><a href="./index.html">Back to homepage</a></p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./js/config.js?v=30"></script>
  <script src="./js/supabase.js?v=30"></script>
  <script src="./js/shared.js?v=30"></script>
  <script src="./js/auth.js?v=30"></script>
</body>
</html>

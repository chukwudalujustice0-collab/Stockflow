<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StockFlow | Notifications</title>
  <link rel="manifest" href="./manifest.json?v=950" />
  <meta name="theme-color" content="#0b5ed7" />
  <link rel="stylesheet" href="./css/style.css?v=950" />
</head>
<body class="app-body">
  <div class="mobile-app-shell">

    <header class="app-topbar premium-topbar">
      <div>
        <p class="eyebrow-text">StockFlow</p>
        <h1 class="page-title">Notifications</h1>
      </div>

      <div class="topbar-user">
        <strong id="welcomeName">User</strong>
        <p id="welcomeRole" class="small-text">director</p>
      </div>
    </header>

    <main class="app-content">
      <div class="dashboard-container">

        <section class="hero-dashboard-card premium-hero-card">
          <div class="hero-dashboard-text">
            <p class="hero-eyebrow">Inbox</p>
            <h2>Notifications & Invitations</h2>
            <p class="hero-subtext">
              Review updates, accept invitations, or decline invitations you do not want.
            </p>
          </div>
        </section>

        <section class="section-card">
          <div class="section-head-row">
            <h3>Pending Invitations</h3>
          </div>
          <div id="pendingInvitationsList">
            <p>Loading invitations...</p>
          </div>
        </section>

        <section class="section-card">
          <div class="section-head-row">
            <h3>All Notifications</h3>
          </div>
          <div id="notificationList">
            <p>Loading notifications...</p>
          </div>
        </section>

      </div>
    </main>

    <nav class="bottom-nav">
      <a href="./dashboard.html" class="bottom-nav-item">
        <span>🏠</span>
        <small>Home</small>
      </a>

      <a href="./products.html" class="bottom-nav-item">
        <span>📦</span>
        <small>Products</small>
      </a>

      <a href="./sales.html" class="bottom-nav-item">
        <span>🛒</span>
        <small>Sales</small>
      </a>

      <a href="./reports.html" class="bottom-nav-item">
        <span>📊</span>
        <small>Reports</small>
      </a>

      <a href="./notifications.html" class="bottom-nav-item active">
        <span>🔔</span>
        <small>Inbox</small>
      </a>
    </nav>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./js/config.js?v=950"></script>
  <script src="./js/supabase.js?v=950"></script>
  <script src="./js/shared.js?v=950"></script>
  <script src="./js/notifications.js?v=950"></script>

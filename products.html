<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StockFlow | Products</title>
  <link rel="manifest" href="./manifest.json?v=203" />
  <meta name="theme-color" content="#0b5ed7" />
  <link rel="stylesheet" href="./css/style.css?v=203" />
</head>
<body class="app-body">
  <div class="mobile-app-shell">

    <header class="app-topbar">
      <div>
        <p class="eyebrow-text">StockFlow</p>
        <h1 class="page-title">Products</h1>
      </div>

      <div class="topbar-user">
        <strong id="welcomeName">User</strong>
        <p id="welcomeRole" class="small-text">director</p>
      </div>
    </header>

    <main class="app-content">
      <div class="dashboard-container">

        <section class="hero-dashboard-card">
          <div class="hero-dashboard-text">
            <p class="hero-eyebrow">Inventory Manager</p>
            <h2>Add and manage products</h2>
            <p class="hero-subtext">Create products, assign store, set pricing and stock quantity.</p>
          </div>
        </section>

        <section class="section-card">
          <div class="section-head-row">
            <h3>Add Product</h3>
          </div>

          <form id="productForm">
            <div class="form-group">
              <label for="productStore">Store</label>
              <select id="productStore" required>
                <option value="">Select store</option>
              </select>
            </div>

            <div class="form-group">
              <label for="productName">Product Name</label>
              <input type="text" id="productName" placeholder="Enter product name" required />
            </div>

            <div class="form-group">
              <label for="productCategory">Category</label>
              <input type="text" id="productCategory" placeholder="Enter category" />
            </div>

            <div class="form-group">
              <label for="productSku">SKU</label>
              <input type="text" id="productSku" placeholder="Enter SKU" />
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="costPrice">Cost Price</label>
                <input type="number" id="costPrice" placeholder="0" />
              </div>

              <div class="form-group">
                <label for="sellingPrice">Selling Price</label>
                <input type="number" id="sellingPrice" placeholder="0" />
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="productQty">Quantity</label>
                <input type="number" id="productQty" placeholder="0" />
              </div>

              <div class="form-group">
                <label for="reorderLevel">Reorder Level</label>
                <input type="number" id="reorderLevel" placeholder="0" />
              </div>
            </div>

            <div class="form-group">
              <label for="productImage">Product Image</label>
              <input type="file" id="productImage" accept="image/*" />
            </div>

            <button type="submit" class="btn-primary full-btn">Save Product</button>
          </form>

          <p id="productMessage" class="message"></p>
        </section>

        <section class="section-card">
          <div class="section-head-row">
            <h3>Products</h3>
          </div>

          <div id="productsList" class="products-grid">
            Loading...
          </div>
        </section>

      </div>
    </main>

    <nav class="bottom-nav">
      <a href="./dashboard.html" class="bottom-nav-item">
        <span>🏠</span>
        <small>Home</small>
      </a>

      <a href="./products.html" class="bottom-nav-item active">
        <span>📦</span>
        <small>Products</small>
      </a>

      <a href="./sales.html" class="bottom-nav-item">
        <span>🛒</span>
        <small>Sales</small>
      </a>

      <a href="./settings.html" class="bottom-nav-item">
        <span>⚙️</span>
        <small>More</small>
      </a>

      <button id="logoutBtn" class="bottom-nav-item logout-nav-btn" type="button">
        <span>🚪</span>
        <small>Logout</small>
      </button>
    </nav>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./js/config.js?v=203"></script>
  <script src="./js/supabase.js?v=203"></script>
  <script src="./js/shared.js?v=203"></script>
  <script src="./js/products.js?v=203"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StockFlow | Receipt</title>
  <link rel="stylesheet" href="./css/style.css?v=980" />

<body class="app-body">
  <div class="mobile-app-shell">

    <header class="app-topbar">
      <div>
        <p class="eyebrow-text">StockFlow</p>
        <h1 class="page-title">Receipt</h1>
      </div>

      <div class="topbar-user">
        <strong id="welcomeName">User</strong>
        <p id="welcomeRole" class="small-text">director</p>
      </div>
    </header>

    <main class="app-content">
      <div class="dashboard-container">

        <section class="hero-dashboard-card premium-hero-card">
          <div class="hero-dashboard-text">
            <p class="hero-eyebrow">Sales Receipt</p>
            <h2>Premium Receipt</h2>
            <p class="hero-subtext">Print or download this receipt as JPEG.</p>
          </div>
        </section>

        <section class="section-card">
          <div id="receiptContainer">
            <p>Loading receipt...</p>
          </div>

          <div style="display:flex; gap:10px; flex-wrap:wrap; margin-top:16px;">
            <button type="button" class="btn-primary inline-btn" onclick="window.print()">Print</button>
            <button type="button" class="btn-outline inline-btn" onclick="downloadReceiptAsJpeg()">Download JPEG</button>
            <a href="./sales.html?v=980" class="btn-outline inline-btn">Back to Sales</a>
          </div>
        </section>

      </div>
    </main>

    <nav class="bottom-nav">
      <a href="./dashboard.html" class="bottom-nav-item">
        <span>🏠</span>

        <span>📊</span>
        <small>Reports</small>
      </a>
      <a href="./settings.html" class="bottom-nav-item">
        <span>⋯</span>
        <small>More</small>
      </a>
    </nav>

  </div>

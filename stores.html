<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StockFlow | Stores</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="app-body">
  <div class="mobile-app-shell">
    <header class="app-topbar">
      <div>
        <p class="eyebrow-text">StockFlow</p>
        <h1 class="page-title">Stores</h1>
      </div>
      <div class="topbar-user">
        <strong id="welcomeName">Loading...</strong>
        <p id="welcomeRole" class="small-text"></p>
      </div>
    </header>

    <main class="app-content">
      <section class="modern-card">
        <h3 id="storeFormTitle">Create Store</h3>

        <form id="storeForm">
          <input type="hidden" id="editingStoreId" />

          <div class="form-group">
            <label for="storeName">Store Name</label>
            <input type="text" id="storeName" placeholder="Enter store name" required />
          </div>

          <div class="form-group">
            <label for="storeType">Store Type</label>
            <input type="text" id="storeType" placeholder="E.g. Fabric Store" />
          </div>

          <div class="form-group">
            <label for="storeAddress">Store Address</label>
            <input type="text" id="storeAddress" placeholder="Enter store address" />
          </div>

          <div style="display:flex; gap:10px; flex-wrap:wrap;">
            <button type="submit" class="btn-primary" id="saveStoreBtn">Save Store</button>
            <button type="button" class="btn-outline" id="cancelEditBtn" style="display:none;">Cancel Edit</button>
          </div>
        </form>

        <p id="storeMessage" class="message"></p>
      </section>

      <section class="modern-card">
        <div class="section-row">
          <h3>All Stores</h3>
        </div>
        <div id="storesList">Loading...</div>
      </section>
    </main>

    <nav class="bottom-nav">
      <a href="dashboard.html" class="bottom-nav-item">
        <span>🏠</span>
        <small>Home</small>
      </a>
      <a href="products.html" class="bottom-nav-item">
        <span>📦</span>
        <small>Products</small>
      </a>
      <a href="sales.html" class="bottom-nav-item">
        <span>🛒</span>
        <small>Sales</small>
      </a>
      <a href="stores.html" class="bottom-nav-item active">
        <span>🏬</span>
        <small>Stores</small>
      </a>
      <button id="logoutBtn" class="bottom-nav-item logout-nav-btn" type="button">
        <span>🚪</span>
        <small>Logout</small>
      </button>
    </nav>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/shared.js"></script>
  <script src="js/stores.js"></script>
</body>
</html>

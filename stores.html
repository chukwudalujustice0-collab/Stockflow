<!DOCTYPE html>

<head>

  <link rel="stylesheet" href="./css/style.css?v=204" />
</head>
<body class="app-body">
  <div class="mobile-app-shell">

    <header class="app-topbar">
      <div>
        <p class="eyebrow-text">StockFlow</p>
        <h1 class="page-title">Stores</h1>
      </div>
    </header>

    <main class="app-content">
      <div class="dashboard-container">

        <section class="section-card">
          <h3>Create Store</h3>

          <form id="storeForm">
            <div class="form-group">
              <label>Store Name</label>
              <input type="text" id="storeName" required />
            </div>

            <button class="btn-primary full-btn">Create Store</button>
          </form>

          <p id="storeMsg" class="message"></p>
        </section>

        <section class="section-card">
          <h3>Your Stores</h3>
          <div id="storeList">Loading...</div>
        </section>

      </div>
    </main>

    <nav class="bottom-nav">
      <a href="./dashboard.html" class="bottom-nav-item">
        <span>🏠</span>
        <small>Home</small>
      </a>

      <a href="./products.html" class="bottom-nav-item">
        <span>📦</span>
        <small>Products</small>
      </a>

      <a href="./sales.html" class="bottom-nav-item">
        <span>🛒</span>
        <small>Sales</small>
      </a>

      <a href="./stores.html" class="bottom-nav-item active">
        <span>🏪</span>
        <small>Stores</small>
      </a>
    </nav>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./js/config.js"></script>
  <script src="./js/supabase.js"></script>
  <script src="./js/shared.js"></script>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Install StockFlow</title>

  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#0b5ed7" />
  <link rel="stylesheet" href="./css/style.css" />
</head>

<body class="auth-body">

  <div class="auth-container">
    <div class="brand-box">
      <h1>StockFlow</h1>
      <p>Install app for faster access</p>
    </div>

    <div class="card" style="text-align:center;">
      <h3>Install StockFlow</h3>

      <p class="small-text">
        Add StockFlow to your phone home screen for quick access,
        offline support and better performance.
      </p>

      <button id="installBtn" class="btn-primary" style="margin-top:15px;">
        Install App
      </button>

      <p id="installMessage" class="message" style="margin-top:10px;"></p>

      <div style="margin-top:15px;">
        <a href="./index.html" class="btn-outline">Back</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./js/config.js"></script>
  <script src="./js/supabase.js"></script>

  <script>
    let deferredPrompt;

    const installBtn = document.getElementById("installBtn");
    const installMessage = document.getElementById("installMessage");

    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installBtn.style.display = "block";
    });

    installBtn.addEventListener("click", async () => {
      if (!deferredPrompt) {
        installMessage.textContent = "Install not available. Use browser menu.";
        return;
      }

      deferredPrompt.prompt();

      const { outcome } = await deferredPrompt.userChoice;

      if (outcome === "accepted") {
        installMessage.textContent = "App installed successfully!";
      } else {
        installMessage.textContent = "Installation cancelled.";
      }

      deferredPrompt = null;
    });
  </script>

</body>
</html>

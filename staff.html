<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StockFlow | Staff</title>

  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#0b5ed7" />
  <link rel="stylesheet" href="./css/style.css" />
</head>

<body class="app-body">
  <div class="mobile-app-shell">

    <!-- TOP -->
    <header class="app-topbar">
      <div>
        <p class="eyebrow-text">StockFlow</p>
        <h1 class="page-title">Staff</h1>
      </div>

      <div class="topbar-user">
        <strong id="welcomeName">Loading...</strong>
        <p id="welcomeRole" class="small-text"></p>
      </div>
    </header>

    <!-- MAIN -->
    <main class="app-content">

      <!-- INVITE FORM -->
      <section class="modern-card">
        <h3>Invite Staff</h3>

        <form id="inviteStaffForm">
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="inviteEmail" required />
          </div>

          <div class="form-group">
            <label>Role</label>
            <select id="inviteRole" required>
              <option value="">Select role</option>
              <option value="assistant_director">Assistant Director</option>
              <option value="store_manager">Store Manager</option>
              <option value="sales_rep">Sales Rep</option>
            </select>
          </div>

          <div class="form-group">
            <label>Assign Store (optional for Assistant Director)</label>
            <select id="inviteStore">
              <option value="">Select store</option>
            </select>
          </div>

          <button type="submit" class="btn-primary">Send Invitation</button>
        </form>

        <p id="inviteMessage" class="message"></p>
      </section>

      <!-- INVITATIONS -->
      <section class="modern-card">
        <div class="section-row">
          <h3>Sent Invitations</h3>
        </div>

        <div id="invitationList">
          Loading...
        </div>
      </section>

    </main>

    <!-- NAV -->
    <nav class="bottom-nav">

      <a href="./dashboard.html" class="bottom-nav-item">
        <span>🏠</span>
        <small>Home</small>
      </a>

      <a href="./products.html" class="bottom-nav-item">
        <span>📦</span>
        <small>Products</small>
      </a>

      <a href="./sales.html" class="bottom-nav-item">
        <span>🛒</span>
        <small>Sales</small>
      </a>

      <a href="./settings.html" class="bottom-nav-item">
        <span>⚙️</span>
        <small>More</small>
      </a>

      <button id="logoutBtn" class="bottom-nav-item logout-nav-btn" type="button">
        <span>🚪</span>
        <small>Logout</small>
      </button>

    </nav>

  </div>

  <!-- SCRIPTS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./js/config.js"></script>
  <script src="./js/supabase.js"></script>
  <script src="./js/shared.js"></script>
  <script src="./js/staff.js"></script>
</body>
</html>

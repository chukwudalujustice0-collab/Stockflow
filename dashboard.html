<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StockFlow | Dashboard</title>

  <link rel="manifest" href="./manifest.json?v=20" />
  <meta name="theme-color" content="#0b5ed7" />
  <link rel="stylesheet" href="./css/style.css?v=20" />
</head>

<body class="app-body">
  <div class="mobile-app-shell">

    <header class="app-topbar">
      <div>
        <p class="eyebrow-text">StockFlow</p>
        <h1 class="page-title">Dashboard</h1>
      </div>

      <div class="topbar-user">
        <strong id="welcomeName">...</strong>
        <p id="welcomeRole" class="small-text"></p>
      </div>
    </header>

    <main class="app-content">

      <section id="setupNotice" class="modern-card" style="display:none;"></section>

      <section class="modern-card">
        <h3 id="companyName">My Business</h3>
        <p id="dashboardRoleText" class="small-text"></p>
      </section>

      <section class="stats-grid-modern">
        <div class="modern-stat-card">
          <h3 id="storeCount">0</h3>
          <p>Stores</p>
        </div>

        <div class="modern-stat-card">
          <h3 id="productCount">0</h3>
          <p>Products</p>
        </div>

        <div class="modern-stat-card">
          <h3 id="salesCount">0</h3>
          <p>Sales</p>
        </div>

        <div class="modern-stat-card">
          <h3 id="lowStockCount">0</h3>
          <p>Low Stock</p>
        </div>
      </section>

      <section class="modern-card">
        <div class="section-row">
          <h3>Your Stores</h3>
        </div>
        <div id="storeList">
          Loading...
        </div>
      </section>

      <section id="invitationNotice" class="modern-card" style="display:none;"></section>

    </main>

    <nav class="bottom-nav">
      <a href="./dashboard.html" class="bottom-nav-item active">
        <span>🏠</span>
        <small>Home</small>
      </a>

      <a href="./products.html" class="bottom-nav-item">
        <span>📦</span>
        <small>Products</small>
      </a>

      <a href="./sales.html" class="bottom-nav-item">
        <span>🛒</span>
        <small>Sales</small>
      </a>

      <button id="logoutBtn" class="bottom-nav-item logout-nav-btn" type="button">
        <span>🚪</span>
        <small>Logout</small>
      </button>
    </nav>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./js/config.js?v=20"></script>
  <script src="./js/supabase.js?v=20"></script>
  <script src="./js/shared.js?v=20"></script>
  <script src="./js/dashboard.js?v=20"></script>
</body>
</html>

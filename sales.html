<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StockFlow | Sales</title>

  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#0b5ed7" />
  <link rel="stylesheet" href="./css/style.css" />
</head>

<body class="app-body">
  <div class="mobile-app-shell">

    <!-- TOP BAR -->
    <header class="app-topbar">
      <div>
        <p class="eyebrow-text">StockFlow</p>
        <h1 class="page-title">Sales</h1>
      </div>

      <div class="topbar-user">
        <strong id="welcomeName">Loading...</strong>
        <p id="welcomeRole" class="small-text"></p>
      </div>
    </header>

    <!-- MAIN -->
    <main class="app-content">

      <section class="modern-card">
        <label for="salesStore">Select Store</label>
        <select id="salesStore">
          <option value="">Select store</option>
        </select>
      </section>

      <section class="modern-card">
        <label for="saleCustomer">Customer (optional)</label>
        <select id="saleCustomer">
          <option value="">Walk-in customer</option>
        </select>
      </section>

      <section class="modern-card">
        <input type="text" id="productSearch" placeholder="Search product..." />
      </section>

      <section class="modern-card">
        <div class="section-row">
          <h3>Products</h3>
        </div>

        <div id="salesProductsList" class="products-grid">
          <p>Select a store first.</p>
        </div>
      </section>

      <section class="modern-card">
        <h3>Cart</h3>

        <div id="cartList">
          <p>No items in cart.</p>
        </div>

        <div class="form-group">
          <label for="paymentMethod">Payment Method</label>
          <select id="paymentMethod">
            <option value="cash">Cash</option>
            <option value="transfer">Transfer</option>
            <option value="pos">POS</option>
            <option value="credit">Credit</option>
          </select>
        </div>

        <div class="form-group" id="cashReceivedWrap">
          <label for="cashReceived">Cash Received</label>
          <input type="number" id="cashReceived" placeholder="0" min="0" step="0.01" />
        </div>

        <div class="totals-box">
          <p>Subtotal: ₦<span id="cartSubtotal">0</span></p>
          <p>Total: ₦<span id="cartTotal">0</span></p>
          <p>Change: ₦<span id="cartChange">0</span></p>
        </div>

        <button id="checkoutBtn" type="button" class="btn-primary">Checkout</button>
        <p id="salesMessage" class="message"></p>
      </section>

      <section class="modern-card">
        <div class="section-row">
          <h3>Recent Sales</h3>
        </div>

        <div id="recentSalesList">
          <p>Loading...</p>
        </div>
      </section>

    </main>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav">

      <a href="./dashboard.html" class="bottom-nav-item">
        <span>🏠</span>
        <small>Home</small>
      </a>

      <a href="./products.html" class="bottom-nav-item">
        <span>📦</span>
        <small>Products</small>
      </a>

      <a href="./sales.html" class="bottom-nav-item active">
        <span>🛒</span>
        <small>Sales</small>
      </a>

      <a href="./settings.html" class="bottom-nav-item">
        <span>⚙️</span>
        <small>More</small>
      </a>

      <button id="logoutBtn" class="bottom-nav-item logout-nav-btn" type="button">
        <span>🚪</span>
        <small>Logout</small>
      </button>

    </nav>

  </div>

  <!-- SCRIPTS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./js/config.js"></script>
  <script src="./js/supabase.js"></script>
  <script src="./js/shared.js"></script>
  <script src="./js/sales.js"></script>
</body>
</html>

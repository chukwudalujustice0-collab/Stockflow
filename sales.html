<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StockFlow | Sales</title>
  <link rel="stylesheet" href="./css/style.css?v=205" />
</head>
<body class="app-body">
  <div class="mobile-app-shell">

    <header class="app-topbar">
      <div>
        <p class="eyebrow-text">StockFlow</p>
        <h1 class="page-title">Sales</h1>
      </div>

      <div class="topbar-user">
        <strong id="welcomeName">User</strong>
        <p id="welcomeRole" class="small-text">director</p>
      </div>
    </header>

    <main class="app-content">
      <div class="dashboard-container">

        <section class="hero-dashboard-card">
          <div class="hero-dashboard-text">
            <p class="hero-eyebrow">Point of Sale</p>
            <h2>Create and manage sales</h2>
            <p class="hero-subtext">Select a store, add products to cart, and complete checkout.</p>
          </div>
        </section>

        <section class="section-card">
          <div class="section-head-row">
            <h3>Start Sale</h3>
          </div>

          <div class="form-group">
            <label for="salesStore">Store</label>
            <select id="salesStore">
              <option value="">Select store</option>
            </select>
          </div>

          <div class="form-group">
            <label for="productSearch">Search Product</label>
            <input type="text" id="productSearch" placeholder="Search by product name" />
          </div>
        </section>

        <section class="section-card">
          <div class="section-head-row">
            <h3>Products</h3>
          </div>

          <div id="salesProductsList" class="products-grid">
            <p>Select a store first.</p>
          </div>
        </section>

        <section class="section-card">
          <div class="section-head-row">
            <h3>Cart</h3>
          </div>

          <div id="cartList">
            <p>No items in cart.</p>
          </div>

          <div class="totals-box">
            <p><strong>Total:</strong> ₦<span id="cartTotal">0</span></p>
          </div>

          <button id="checkoutBtn" type="button" class="btn-primary full-btn">
            Complete Sale
          </button>

          <p id="salesMessage" class="message"></p>
        </section>

        <section class="section-card">
          <div class="section-head-row">
            <h3>Recent Sales</h3>
          </div>

          <div id="recentSalesList">
            <p>Loading...</p>
          </div>
        </section>

      </div>
    </main>

    <nav class="bottom-nav">
      <a href="./dashboard.html" class="bottom-nav-item">
        <span>🏠</span>
        <small>Home</small>
      </a>

      <a href="./products.html" class="bottom-nav-item">
        <span>📦</span>
        <small>Products</small>
      </a>

      <a href="./sales.html" class="bottom-nav-item active">
        <span>🛒</span>
        <small>Sales</small>
      </a>

      <a href="./stores.html" class="bottom-nav-item">
        <span>🏪</span>
        <small>Stores</small>
      </a>
    </nav>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./js/config.js"></script>
  <script src="./js/supabase.js"></script>
  <script src="./js/shared.js"></script>
  <script src="./js/sales.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StockFlow | Debt Book</title>

  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#0b5ed7" />
  <link rel="stylesheet" href="./css/style.css" />
</head>

<body class="app-body">
  <div class="mobile-app-shell">

    <header class="app-topbar">
      <div>
        <p class="eyebrow-text">StockFlow</p>
        <h1 class="page-title">Debt Book</h1>
      </div>

      <div class="topbar-user">
        <strong id="welcomeName">Loading...</strong>
        <p id="welcomeRole" class="small-text"></p>
      </div>
    </header>

    <main class="app-content">

      <section class="modern-card">
        <h3>Record Debt</h3>

        <form id="debtForm">
          <div class="form-group">
            <label>Customer</label>
            <select id="debtCustomer" required>
              <option value="">Select customer</option>
            </select>
          </div>

          <div class="form-group">
            <label>Amount</label>
            <input type="number" id="debtAmount" min="0" step="0.01" required />
          </div>

          <div class="form-group">
            <label>Note</label>
            <input type="text" id="debtNote" placeholder="Optional note" />
          </div>

          <button type="submit" class="btn-primary">Save Debt</button>
        </form>

        <p id="debtMsg" class="message"></p>
      </section>

      <section class="modern-card">
        <div class="section-row">
          <h3>Debt List</h3>
        </div>

        <div id="debtList">
          Loading...
        </div>
      </section>

    </main>

    <nav class="bottom-nav">
      <a href="./dashboard.html" class="bottom-nav-item">
        <span>🏠</span>
        <small>Home</small>
      </a>

      <a href="./products.html" class="bottom-nav-item">
        <span>📦</span>
        <small>Products</small>
      </a>

      <a href="./sales.html" class="bottom-nav-item">
        <span>🛒</span>
        <small>Sales</small>
      </a>

      <a href="./settings.html" class="bottom-nav-item">
        <span>⚙️</span>
        <small>More</small>
      </a>

      <button id="logoutBtn" class="bottom-nav-item logout-nav-btn" type="button">
        <span>🚪</span>
        <small>Logout</small>
      </button>
    </nav>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./js/config.js"></script>
  <script src="./js/supabase.js"></script>
  <script src="./js/shared.js"></script>
  <script src="./js/debt-book.js"></script>
</body>
</html>

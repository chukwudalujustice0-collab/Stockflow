<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StockFlow | Settings</title>
  <link rel="stylesheet" href="./css/style.css?v=207" />
</head>
<body class="app-body">
  <div class="mobile-app-shell">

    <header class="app-topbar">
      <div>
        <p class="eyebrow-text">StockFlow</p>
        <h1 class="page-title">Settings</h1>
      </div>

      <div class="topbar-user">
        <strong id="welcomeName">User</strong>
        <p id="welcomeRole" class="small-text">director</p>
      </div>
    </header>

    <main class="app-content">
      <div class="dashboard-container">

        <section class="section-card">
          <div class="section-head-row">
            <h3>Profile</h3>
          </div>

          <form id="profileForm">
            <div class="form-group">
              <label for="settingsFullName">Full Name</label>
              <input type="text" id="settingsFullName" />
            </div>

            <div class="form-group">
              <label for="settingsPhone">Phone</label>
              <input type="text" id="settingsPhone" />
            </div>

            <div class="form-group">
              <label for="settingsEmail">Email</label>
              <input type="email" id="settingsEmail" disabled />
            </div>

            <button type="submit" class="btn-primary full-btn">Save Profile</button>
          </form>

          <p id="profileMsg" class="message"></p>
        </section>

        <section class="section-card">
          <div class="section-head-row">
            <h3>Company</h3>
          </div>

          <form id="companyForm">
            <div class="form-group">
              <label for="settingsCompanyName">Company Name</label>
              <input type="text" id="settingsCompanyName" placeholder="Enter company name" />
            </div>

            <button type="submit" class="btn-primary full-btn">Save Company</button>
          </form>

          <p id="companyMsg" class="message"></p>
        </section>

        <section class="section-card">
          <div class="section-head-row">
            <h3>Quick Links</h3>
          </div>

          <div class="quick-actions-grid">
            <a href="./products.html" class="quick-action-box">
              <span class="quick-action-emoji">📦</span>
              <span class="quick-action-title">Products</span>
            </a>

            <a href="./stores.html" class="quick-action-box">
              <span class="quick-action-emoji">🏪</span>
              <span class="quick-action-title">Stores</span>
            </a>

            <a href="./sales.html" class="quick-action-box">
              <span class="quick-action-emoji">🛒</span>
              <span class="quick-action-title">Sales</span>
            </a>

            <a href="./reports.html" class="quick-action-box">
              <span class="quick-action-emoji">📊</span>
              <span class="quick-action-title">Reports</span>
            </a>
          </div>
        </section>

      </div>
    </main>

    <nav class="bottom-nav">
      <a href="./dashboard.html" class="bottom-nav-item">
        <span>🏠</span>
        <small>Home</small>
      </a>

      <a href="./products.html" class="bottom-nav-item">
        <span>📦</span>
        <small>Products</small>
      </a>

      <a href="./sales.html" class="bottom-nav-item">
        <span>🛒</span>
        <small>Sales</small>
      </a>

      <a href="./settings.html" class="bottom-nav-item active">
        <span>⚙️</span>
        <small>More</small>
      </a>
    </nav>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./js/config.js"></script>
  <script src="./js/supabase.js"></script>
  <script src="./js/shared.js"></script>
  <script src="./js/settings.js"></script>
</body>
</html>
